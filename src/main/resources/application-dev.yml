spring:
  datasource:
    # MySQL 主数据源（标准配置，支持 Spring Boot 自动配置）
    url: jdbc:mysql://127.0.0.1:3306/mdatax?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

  sql:
    init:
      mode: never

# ClickHouse 配置（自定义数据源）
clickhouse:
  datasource:
    url: jdbc:clickhouse://127.0.0.1:8123/default
    username: admin
    password: admin123
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

# DolphinScheduler 配置
dolphinscheduler:
  enabled: true
  base-url: http://localhost:12345/dolphinscheduler
  token: d986ef76464e0983a5d949548337dc83
  # 注意：这是项目的 code，不是 id
  # 可通过 GET /projects?pageNo=1&pageSize=10 查询真实 code
  project-code: 21437946442176
  tenant-code: default
  worker-group: default
  # 回调密钥，用于 DS Worker 回调 MDataX 时的身份校验
  callback-secret: mdatax-dev-secret-change-in-production
  # DS Worker 回调 MDataX 的地址（不含 context-path，因为 buildCallbackScript 会自动加 /api）
  # 如果 DS 部署在 Docker 中而 MDataX 在宿主机，Mac/Windows 使用 host.docker.internal:8080
  # Linux 环境请替换为宿主机实际内网 IP
  callback-url: http://host.docker.internal:8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mogu.data.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
