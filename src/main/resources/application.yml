spring:
  application:
    name: MDataX
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  jackson:
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

# 调度模式: local(本地Spring调度) / dolphinscheduler
scheduler:
  type: dolphinscheduler

logging:
  level:
    com.mogu.data.mapper: debug
    com.clickhouse.jdbc: debug
